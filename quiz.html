<!DOCTYPE html>
<html lang="en">
<head>

  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <title>French Master — Quiz</title>

  <!-- BASE -->
  <link rel="stylesheet" href="css/base/reset.css">
  <link rel="stylesheet" href="css/base/variables.css">
  <link rel="stylesheet" href="css/base/typography.css">
  <link rel="stylesheet" href="css/base/animations.css">

  <!-- LAYOUT -->
  <link rel="stylesheet" href="css/layout/containers.css">
  <link rel="stylesheet" href="css/layout/sections.css">

  <!-- COMPONENTS -->
  <link rel="stylesheet" href="css/components/buttons.css">
  <link rel="stylesheet" href="css/components/cards.css">
  <link rel="stylesheet" href="css/components/modals.css">
  <link rel="stylesheet" href="css/components/progress.css">
  <link rel="stylesheet" href="css/components/toast.css">

  <!-- PAGE -->
  <link rel="stylesheet" href="css/pages/quiz.css">

</head>

<body>

<div class="quiz-page">

    <header class="quiz-header">

        <h1>
            🇫🇷 French Master — Quiz
        </h1>

        <div class="quiz-navigation">

            <a href="index.html" class="nav-button">
                🏠 Home
            </a>

            <a href="dashboard.html" class="nav-button">
                📊 Dashboard
            </a>

            <a href="vocabulary.html" class="nav-button">
                📖 Vocabulary
            </a>

        </div>

    </header>

    <main class="quiz-main">

        <section id="levelsSection" class="quiz-section">

            <h2>
                🎮 Choose a Level
            </h2>

            <div id="levelsGrid" class="levels-grid"></div>

        </section>

        <section id="questionSection" class="quiz-section hidden">

            <div class="question-card">

                <div id="questionLevel" class="question-level"></div>

                <div id="questionText" class="question-text"></div>

                <div id="answersContainer" class="answers-container"></div>

            </div>

        </section>

        <section id="resultsSection" class="quiz-section hidden">

            <div class="results-card">

                <h2>
                    🏆 Results
                </h2>

                <div id="resultPercentage"></div>

                <div id="resultMessage"></div>

                <button id="retryLevelButton" class="main-button">
                    🔄 Retry
                </button>

                <button id="nextLevelButton" class="main-button">
                    ➡️ Next Level
                </button>

            </div>

        </section>

    </main>

</div>

<!-- CONFIG -->
<script src="js/config/app-config.js"></script>
<script src="js/config/game-config.js"></script>
<script src="js/config/pedagogy-config.js"></script>

<script src="js/pedagogy/themes/weather.js"></script>
<script src="js/pedagogy/themes/verbs.js"></script>
<script src="js/pedagogy/themes/politeness.js"></script>

<!-- ENGINES -->
<script src="js/engine/save-engine.js"></script>
<script src="js/engine/player-engine.js"></script>
<script src="js/engine/session-engine.js"></script>
<script src="js/engine/scoring-engine.js"></script>
<script src="js/engine/progression-engine.js"></script>

<!-- PAGE -->
<script src="js/pages/quiz-page.js"></script>

</body>
</html>
